<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>メンテナンス中</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: #f7f4ef;
      color: #2f2a24;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      text-align: center;
    }

    .card {
      width: 100%;
      max-width: 560px;
      padding: 40px 28px;
      border-radius: 24px;
      background: #ffffff;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
    }

    .label {
      margin: 0 0 12px;
      font-size: 14px;
      letter-spacing: 0.12em;
      color: #9b7a4a;
    }

    h1 {
      margin: 0 0 16px;
      font-size: 28px;
      line-height: 1.4;
    }

    p {
      margin: 0;
      font-size: 16px;
      line-height: 1.8;
      color: #5f554b;
    }
  </style>
</head>
<body>
  <main class="card">
    <p class="label">MAINTENANCE</p>
    <h1>現在メンテナンス中です</h1>
    <p>公開準備が整うまで、しばらくお待ちください。</p>
  </main>
</body>
</html>
