<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#ffffff" />
  <title>語り場ニュース</title>
  <link rel="manifest" href="./manifest.webmanifest">
  <link rel="stylesheet" href="./styles.css?v=40" />
</head>
<body>
  <div class="auth" id="authGate">
    <div class="auth__panel">
      <h1 class="auth__title">語り場ニュース</h1>
      <p class="auth__sub">ログインして続きをご利用ください</p>

      <form id="loginForm" class="auth__form">
        <input type="email" id="loginEmail" placeholder="メールアドレス" required>
        <input type="password" id="loginPassword" placeholder="パスワード" required>
        <button type="submit" id="loginBtn">ログイン</button>
      </form>

      <div class="auth__switch">
        <button type="button" id="showRegisterBtn" class="auth__linkbtn">新規登録はこちら</button>
      </div>

      <form id="registerForm" class="auth__form" style="display:none;">
        <input type="text" id="registerName" placeholder="お名前" required>
        <input type="email" id="registerEmail" placeholder="メールアドレス" required>
        <input type="password" id="registerPassword" placeholder="パスワード" required>
        <button type="submit" id="registerBtn">新規登録</button>
      </form>

      <div class="auth__switch">
        <button type="button" id="showLoginBtn" class="auth__linkbtn" style="display:none;">ログイン画面に戻る</button>
      </div>

      <div class="auth__msg" id="loginMsg"></div>
    </div>
  </div>

  <div class="app" id="appRoot" hidden>

    <!-- Topbar -->
    <header class="topbar">
      <div class="brand">
        <div class="brand__texts">
          <div class="brand__name">語り場ニュース</div>
          <div class="brand__sub">限定配信</div>
        </div>
      </div>

      <button class="iconbtn" id="btnInstall" aria-label="Install" title="インストール" hidden>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
        </svg>
      </button>
    </header>
    <div class="notify-banner" id="notifyBanner" hidden>
      <span>新しい記事があります</span>
      <button id="notifyRefresh" type="button">更新</button>
      <button id="notifyDismiss" type="button" aria-label="閉じる">×</button>
    </div>
    <main id="mainContent">

    <!-- Home Page -->
    <section class="page page--active" data-page="home">
      <!-- Search -->
      <section class="search">
        <div class="search__box">
          <div class="search__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5
              6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49
              19l-4.99-5zM9.5 14C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5
              11.99 14 9.5 14z"/></svg>
          </div>
          <input id="q" type="text" placeholder="検索（例：告知 / 重要 / イベント）" />
          <button class="search__clear" id="btnClear" aria-label="Clear">
            <svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41
            1.42L12 13.41l-6.89 6.3-1.41-1.42L10.59 12 3.7 5.71 5.11 4.29 12
            10.59l6.89-6.3z"/></svg>
          </button>
        </div>
      </section>

      <!-- Chips -->
      <section class="chips">
        <div class="chips__row" id="chipRow"></div>
      </section>

      <!-- Feed -->
      <section class="feed">
        <div class="feed__meta">
          <div class="feed__title" id="feedTitle">Latest</div>
          <div class="feed__actions">
            <button class="sort-toggle" id="btnSortToggle" type="button" aria-label="Sort order">新しい順</button>
            <div class="feed__hint" id="feedHint">0件</div>
          </div>
        </div>
        <div class="cards" id="cards"></div>
      </section>
    </section>

<!-- Schedule Page -->
<section class="page" data-page="schedule">
  <section class="pane pane--schedule">
    <div class="pane__head">
      <h2 class="pane__title">イベントカレンダー</h2>
      <p class="pane__sub">イベントのみを表示します</p>
    </div>

    <div class="schedview schedview--top">
      <div class="seg" id="schedViewSeg">
        <button class="seg__btn" data-view="month" type="button">1カ月</button>
        <button class="seg__btn" data-view="2w" type="button">2週間</button>
      </div>
    </div>

    <div id="cal"></div>
  </section>
</section>

    <!-- Saved Page -->
    <section class="page" data-page="saved">
      <section class="pane">
        <div class="pane__head">
          <h2 class="pane__title">保存</h2>
          <p class="pane__sub">あとで読む記事</p>
        </div>
        <div class="cards" id="savedCards"></div>
        <div class="empty" id="savedEmpty" style="display:none;">
          <div class="empty__icon">🔖</div>
          <div class="empty__title">保存がありません</div>
          <div class="empty__text">記事を開いて「保存」してください。</div>
        </div>
      </section>
    </section>

    <!-- Contact Page -->
    <section class="page" data-page="contact">
  <div class="page__inner">
    <h2>語り場 共同オーナー</h2>

    <div id="ownerList" class="owner-list"></div>

    <hr style="margin:32px 0; opacity:.2;">

    <h2>語り場全体へはこちら</h2>

    <form id="contactForm" class="contact-form">
      <input type="text" id="cName" placeholder="お名前" required>
      <input type="email" id="cEmail" placeholder="メールアドレス" required>
      <textarea id="cMessage" placeholder="お問い合わせ内容" rows="5" required></textarea>
      <button type="submit">送信</button>
    </form>
  </div>
</section>

    <!-- Admin Page -->
    <section class="page" data-page="admin">
      <section class="pane">
        <div class="pane__head pane__head--row">
          <h2 class="pane__title">管理</h2>
        </div>
        <div class="admin-tabs" role="tablist" aria-label="Admin tabs">
          <button class="admin-tab admin-tab--active" id="adminTabEditor" type="button" role="tab" aria-selected="true">新規記事</button>
          <button class="admin-tab" id="adminTabList" type="button" role="tab" aria-selected="false">記事一覧</button>
          <button class="admin-tab" id="adminTabEdit" type="button" role="tab" aria-selected="false" hidden>記事編集</button>
        </div>

        <div class="admin__row">
          <div class="admin__editor" id="adminPanelEditor">
            <div class="admin__editorhead">
              <div class="admin__listh">新規記事作成</div>
              <button class="btn" id="btnNewPost" type="button">＋ 新規記事</button>
            </div>

            <form class="form" id="postForm">
              <div class="grid2">
                <label class="field">
                  <div class="field__label">タイトル</div>
                  <input class="input" id="pTitle" placeholder="例：コミュニティ限定の告知" required />
                </label>

                <label class="field">
                  <div class="field__label">日付</div>
                  <input class="input" id="pDate" type="date" required />
                </label>
              </div>

              <label class="field">
                <div class="field__label">チャンネル</div>
                <select class="input" id="pChannel">
                  <option value="article">記事</option>
                  <option value="event">イベント概要</option>
                  <option value="ops">運営</option>
                </select>
              </label>

              <label class="field">
                <div class="field__label">タグ（カンマ区切り）</div>
                <input class="input" id="pTags" placeholder="例：固定,Zoom,必読" />
              </label>

              <label class="field">
                <div class="field__label">本文（改行で段落）</div>
                <textarea class="textarea" id="pBody" rows="8" placeholder="本文を入力"></textarea>
              </label>

              <label class="field">
  <div class="field__label">画像追加</div>
  <input class="input" id="pImageFiles" type="file" accept="image/*" multiple>
</label>

<label class="field">
  <div class="field__label">画像URL（自動反映 / 手入力も可）</div>
  <textarea class="textarea" id="pImages" rows="3" placeholder="https://..."></textarea>
</label>

<label class="field">
  <div class="field__label">動画URL（YouTube等 / mp4直リンク）</div>
  <input class="input" id="pVideo" placeholder="https://..." />
</label>

              <div class="grid2">
                <label class="field">
                  <div class="field__label">CTAテキスト（任意）</div>
                  <input class="input" id="pCtaText" placeholder="例：参加フォームへ" />
                </label>

                <label class="field">
                  <div class="field__label">CTA URL（任意）</div>
                  <input class="input" id="pCtaUrl" placeholder="https://..." />
                </label>
              </div>

              <div class="hint">
                現在の状態: <span id="pStatusView">未設定（投稿すると状態が反映されます）</span>
              </div>
              <div class="admin-actions">
                <button class="btn" id="btnPublishPost" type="button" disabled>投稿</button>
                <button class="btn" id="btnDraftPost" type="button" disabled>下書き</button>
                <button class="btn" id="btnPrivatePost" type="button" disabled>非公開</button>
              </div>
            </form>
          </div>

          <div class="admin__list" id="adminPanelList" hidden>
            <div class="admin__listhead">
              <div class="admin__listh">記事一覧</div>
              <div class="admin__listhint" id="adminCount">0件</div>
            </div>
            <div class="admin__items" id="adminItems"></div>
          </div>

          <div class="admin__editor" id="adminPanelEdit" hidden>
            <div class="admin__editorhead">
              <div class="admin__listh">記事編集</div>
            </div>

            <form class="form" id="editForm">
              <div class="grid2">
                <label class="field">
                  <div class="field__label">タイトル</div>
                  <input class="input" id="eTitle" placeholder="例：コミュニティ限定の告知" required />
                </label>

                <label class="field">
                  <div class="field__label">日付</div>
                  <input class="input" id="eDate" type="date" required />
                </label>
              </div>

              <label class="field">
                <div class="field__label">チャンネル</div>
                <select class="input" id="eChannel">
                  <option value="article">記事</option>
                  <option value="event">イベント概要</option>
                  <option value="ops">運営</option>
                </select>
              </label>

              <label class="field">
                <div class="field__label">タグ（カンマ区切り）</div>
                <input class="input" id="eTags" placeholder="例：固定,Zoom,必読" />
              </label>

              <label class="field">
                <div class="field__label">本文（改行で段落）</div>
                <textarea class="textarea" id="eBody" rows="8" placeholder="本文を入力"></textarea>
              </label>

              <label class="field">
                <div class="field__label">画像追加</div>
                <input class="input" id="eImageFiles" type="file" accept="image/*" multiple>
              </label>

              <label class="field">
                <div class="field__label">画像URL（自動反映 / 手入力も可）</div>
                <textarea class="textarea" id="eImages" rows="3" placeholder="https://..."></textarea>
              </label>

              <label class="field">
                <div class="field__label">動画URL（YouTube等 / mp4直リンク）</div>
                <input class="input" id="eVideo" placeholder="https://..." />
              </label>

              <div class="grid2">
                <label class="field">
                  <div class="field__label">CTAテキスト（任意）</div>
                  <input class="input" id="eCtaText" placeholder="例：参加フォームへ" />
                </label>

                <label class="field">
                  <div class="field__label">CTA URL（任意）</div>
                  <input class="input" id="eCtaUrl" placeholder="https://..." />
                </label>
              </div>

              <div class="hint">
                現在の状態: <span id="eStatusView">未設定</span>
              </div>
              <div class="admin-actions">
                <button class="btn" id="btnEditPublishPost" type="button" disabled>投稿</button>
                <button class="btn" id="btnEditDraftPost" type="button" disabled>下書き</button>
                <button class="btn" id="btnEditPrivatePost" type="button" disabled>非公開</button>
              </div>
            </form>
          </div>
        </div>
      </section>
    </section>
    </main>

    <!-- Bottom Nav -->
    <nav class="bottomnav" aria-label="Bottom Navigation">
      <button class="navitem navitem--active" data-nav="home" aria-label="Home">
        <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <span>Home</span>
      </button>

      <button class="navitem" data-nav="schedule" aria-label="Schedule">
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 2h2v2h6V2h2v2h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h4V2zm15 8H2v10h20V10zM3 8h18V6H3v2z"/>
        </svg>
        <span>Schedule</span>
      </button>

      <button class="navitem" data-nav="saved" aria-label="Saved">
        <svg viewBox="0 0 24 24"><path d="M6 2h12a2 2 0 0 1 2 2v18l-8-4-8 4V4a2 2 0 0 1 2-2z"/></svg>
        <span>Saved</span>
      </button>

      <button class="navitem" data-nav="contact" aria-label="Contact">
    <svg viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4zm0 2c-4.42 0-8 2-8 4v2h16v-2c0-2-3.58-4-8-4z"/>
    </svg>
    <span>Contact</span>
  </button>

      <button class="navitem" data-nav="admin" aria-label="Admin">
        <!-- pencil icon -->
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zm2.92 2.83H5v-.92l9.06-9.06.92.92L5.92 20.08zM20.71 7.04a1.003 1.003 0 0 0 0-1.42l-2.34-2.34a1.003 1.003 0 0 0-1.42 0l-1.83 1.83 3.75 3.75 1.84-1.82z"/>
        </svg>
        <span>Admin</span>
      </button>
    </nav>

    <!-- Drawer: Article Detail -->
    <div class="drawer" id="drawer" aria-hidden="true">
      <div class="drawer__scrim" id="drawerScrim"></div>
      <div class="drawer__panel" role="dialog" aria-modal="true" aria-label="Article detail">
        <div class="drawer__top">
          <div class="drawer__meta">
            <span class="badge" id="drawerBadge"><span class="badge__dot"></span><span id="drawerBadgeText">Info</span></span>
            <span class="drawer__date" id="drawerDate">-</span>
          </div>
          <div style="display:flex; gap:8px;">
            <button class="iconbtn" id="btnSave" aria-label="Save">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2h12a2 2 0 0 1 2 2v18l-8-4-8 4V4a2 2 0 0 1 2-2z"/></svg>
            </button>
            <button class="iconbtn" id="btnClose" aria-label="Close">
              <svg viewBox="0 0 24 24"><path d="M18.3 5.71 12 12l6.3 6.29-1.41
                1.42L12 13.41l-6.89 6.3-1.41-1.42L10.59 12 3.7 5.71 5.11 4.29 12
                10.59l6.89-6.3z"/></svg>
            </button>
          </div>
        </div>



        <div class="article">
          <h2 class="article__title" id="aTitle">-</h2>

          <div class="article__stats" id="aStats"></div>

          <div class="article__summary" id="aSummary">
            <ul id="aSummaryList"></ul>
          </div>

          <div class="article__body" id="aBody"></div>

          <div class="article__footer">
            <div class="cta" id="cta" style="display:none;">
              <div class="cta__text" id="ctaText">リンク</div>
              <a class="cta__btn" id="ctaBtn" href="#" target="_blank" rel="noopener">開く</a>
            </div>
            <div class="muted" id="aMeta"></div>
          </div>
        </div>
      </div>
    </div>

  </div>

  <!-- Event Modal -->
<div class="eventmodal" id="eventModal" aria-hidden="true">
  <div class="eventmodal__scrim" id="eventModalScrim"></div>

  <div class="eventmodal__panel" role="dialog" aria-modal="true" aria-label="Event detail">
    <div class="eventmodal__head">
      <div class="eventmodal__title" id="eventModalTitle">イベント詳細</div>
      <button class="iconbtn" id="eventModalClose" aria-label="Close" type="button">×</button>
    </div>
    <div class="eventmodal__body" id="eventModalBody"></div>
  </div>
</div>

  <script src="config.js?v=40"></script>
  <script src="./app.js?v=40"></script>
</body>
</html>
